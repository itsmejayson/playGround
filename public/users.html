<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<title>Users</title>
<style>

body {
  font-family: system-ui;
  background: #f6f7fb;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 12px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.actions {
  display: flex;
  gap: 10px;
}

button {
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.create {
  background: #22c55e;
  color: white;
}

.logout {
  background: #ef4444;
  color: white;
}

.update {
  background: #facc15;
}

.delete {
  background: #ef4444;
  color: white;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #f9fafb;
}

@media (max-width: 600px) {
  table, thead, tbody, tr, td {
    display: block;
  }

  tr {
    margin-bottom: 10px;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 10px;
  }

  td {
    display: flex;
    justify-content: space-between;
  }
}

</style>
</head>
<body style="display:none;">

<div class="container">
  <div class="header">
    <h3>Users</h3>

    <div class="actions">
      <button class="create" onclick="createUser()">+ Add</button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="userTableBody"></tbody>
  </table>
</div>
<script src="users.js"></script>
</body>
</html>

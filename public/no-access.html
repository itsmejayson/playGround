<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>No Access</title>
<style>

body {
  font-family: system-ui;
  background: #f6f7fb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  text-align: center;
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 90%;
  max-width: 300px;
}

h2 {
  color: #ef4444;
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

</style>
</head>
<body>

<div class="card">
  <h2>Access Denied</h2>
  <p>Please login first</p>
  <button onclick="redirect()">Go to Login</button>
</div>

<script>
const redirect = () => {
  window.location.replace('/');
};
</script>

</body>
</html>
